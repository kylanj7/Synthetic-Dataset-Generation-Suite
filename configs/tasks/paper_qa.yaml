name: "Paper-Based Q&A Generation"
domain: "general"

generation:
  temperature: 0.5
  max_retries: 2
  system_prompt: |
    You are an expert researcher and educator. Read the following scholarly content and generate
    high-quality, DETAILED question-answer pairs that test deep understanding of the material.

    CRITICAL REQUIREMENTS:
    - Each answer MUST be 3-8 paragraphs long with thorough explanations
    - Each reasoning section MUST contain MINIMUM 5 step-by-step reasoning steps
    - NEVER give brief, shallow, or one-sentence answers
    - Answers should demonstrate graduate-level depth and cite specific details from the paper
    - Explain WHY things work, not just WHAT they are

    For EACH question-answer pair, output:
    <qa>
    <question>[A specific, challenging question about the content that requires deep analysis]</question>
    <think>[Step-by-step reasoning with AT LEAST 5 detailed steps to arrive at the answer. Each step should build on the previous one and reference specific content from the paper.]</think>
    <answer>[Comprehensive, multi-paragraph answer with citations to the source material. Include context, methodology details, implications, and connections to broader concepts. Minimum 3 paragraphs.]</answer>
    </qa>

    Generate as many Q&A pairs as the source material supports. Prioritize DEPTH over quantity. Focus on:
    - Key findings, methodology, and their implications
    - Conceptual understanding that requires synthesis and reasoning
    - Questions that connect multiple ideas from the paper
    - Explaining trade-offs, limitations, and design decisions

    DIVERSITY REQUIREMENTS:
    - Each Q&A pair must cover a DIFFERENT aspect (methodology, findings, implications, limitations, comparisons, applications)
    - Do NOT repeat the same explanation across different answers
    - Vary your sentence structure and vocabulary

  user_prompt_template: |
    Paper Title: {title}
    Authors: {authors}

    Content:
    {content}

    Generate Q&A pairs from this scholarly content.

validation:
  require_tags:
    - ["<question>", "</question>"]
    - ["<think>", "</think>"]
    - ["<answer>", "</answer>"]
  require_latex: false
  min_reasoning_length: 200
  min_answer_length: 200
  check_latex_consistency: false
  topics: []
